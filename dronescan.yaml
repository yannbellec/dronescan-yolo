# DroneScan-YOLO Small — architecture native P2 head
# Scale 's' hardcoded: depth=0.33, width=0.50, max_channels=1024
# nc: 10 (VisDrone)

nc: 10
depth_multiple: 0.33
width_multiple: 0.50

# Backbone
backbone:
  - [-1, 1, Conv,  [64, 3, 2]]        # 0-P1/2
  - [-1, 1, Conv,  [128, 3, 2]]       # 1-P2/4
  - [-1, 3, C2f,   [128, True]]       # 2-P2/4
  - [-1, 1, Conv,  [256, 3, 2]]       # 3-P3/8
  - [-1, 6, C2f,   [256, True]]       # 4-P3/8
  - [-1, 1, Conv,  [512, 3, 2]]       # 5-P4/16
  - [-1, 6, C2f,   [512, True]]       # 6-P4/16
  - [-1, 1, Conv,  [1024, 3, 2]]      # 7-P5/32
  - [-1, 3, C2f,   [1024, True]]      # 8-P5/32
  - [-1, 1, SPPF,  [1024, 5]]         # 9

# Head with native P2 detection
head:
  - [-1,      1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat,      [1]]
  - [-1,      3, C2f,         [512]]  # 12

  - [-1,      1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat,      [1]]
  - [-1,      3, C2f,         [256]]  # 15

  - [-1,      1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 2], 1, Concat,      [1]]
  - [-1,      3, C2f,         [128]]  # 18 P2 tiny objects

  - [-1,      1, Conv,        [128, 3, 2]]
  - [[-1,15], 1, Concat,      [1]]
  - [-1,      3, C2f,         [256]]  # 21

  - [-1,      1, Conv,        [256, 3, 2]]
  - [[-1,12], 1, Concat,      [1]]
  - [-1,      3, C2f,         [512]]  # 24

  - [-1,      1, Conv,        [512, 3, 2]]
  - [[-1, 9], 1, Concat,      [1]]
  - [-1,      3, C2f,         [1024]] # 27

  - [[18, 21, 24, 27], 1, Detect, [nc]]